<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waifu Translations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/stylesheet.css">
    <link rel="stylesheet" href="assets/fonts/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.slim.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="mainBody d-flex flex-column text-center container p-4">
  <header>
      <div class="d-flex justify-content-center align-items-center">
          <div class="flexNameplate">
              <div class="imgContainer">
                  <img src="assets/face.jpg" alt="myFace">
              </div>
              <div class="nameplateName">Gaurav Gupta</div>
          </div>
          <div class="introduction">
              <div class="d-flex flex-column px-3">
                  <div class="py-5">
                      Professional H-Game Translator.
                      <br>Been in the business for nearly a decade.
                  </div>
                  <div class="py-2">
                      Contact me at:
                  </div>
                  <div class="email">
                      Email: <a href="mailto:admin@waifutranslations.com">admin@waifutranslations.com</a>
                  </div>
                  <div class="twitter">
                      Twitter: <a href="https://x.com/09eragera09">@09eragera09</a>
                  </div>

              </div>
          </div>
      </div>
  </header>
  <content>
      <div class="row">
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="DesertIsland"></button>
          </div>
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="Gehenna"></button>
          </div>
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="FallenGF"></button>
          </div>
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="Cuniculus"></button>
          </div>
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="DungeonNTR"></button>
          </div>
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="Shachiku"></button>
          </div>
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="WTR"></button>
          </div>
          <div class="col-sm-6 p-3">
              <button type="button" class="gameElem" id="Mizuki"></button>
          </div>
      </div>
  </content>
  <footer class="pt-4">
        <div class="copyright">&copy 2020-2026 Gaurav Gupta @ Waifu Translations </div>
  </footer>
</div>
</body>
<script>
    let gameData = {
        "DesertIsland": {
            title: "Desert Island in Summer!",
            description: "This was the first game I ever localized for Otaku Plan. A very simple, short yet sweet game where you're stuck on a 'desert island' with your friends, four of whom are girls who're into you. I especially enjoyed some of the puns and jokes the creator used, although they were quite annoying to TL.",
            steam: "https://store.steampowered.com/app/2346500/Desert_Island_in_Summer/",
            images: ["desert1", "desert2", "desert3", "desert4", "desert5"],
        },
        "Gehenna": {
            title: "Gehenna",
            description: "The first big game I localized for Otaku Plan. A game made in RPGMaker, with a big focus on varied content and a LOT of H. Interesting project, although translating the item descriptions was hell.",
            steam: "https://store.steampowered.com/app/2449530/Gehenna/",
            images: ["gehenna1", "gehenna2", "gehenna3", "gehenna4", "gehenna5"]
        },
        "FallenGF":{
            title:"NTR RPG Fallen GF",
            description:"A relatively short NTR game, the most interesting part of which was that the girls were complete whores. MC really did dodge a bullet in every non-happy ending.",
            steam:"https://store.steampowered.com/app/2817390/FALLEN_GF/",
            images:["fgf1", "fgf2", "fgf3", "fgf4", "fgf5"],
        },
        "Cuniculus":{
            title:"The Cuniculus of Paradise",
            description:"A mecha H-game made in RPGMaker. The content was super vanilla, but the story was interesting and so was the mecha combat. Overall, I enjoyed playing it as much as I enjoyed localizing it.",
            steam:"https://store.steampowered.com/app/3075150/The_Cuniculus_of_Paradise/",
            images:['cuni1', 'cuni2', 'cuni3', 'cuni4', 'cuni5'],
        },
        "DungeonNTR":{
            title:"I wish I'd never gone into the Dungeon",
            description:"Another NTR title. For an NTR game, it was interesting. The guy doing the NTR was a complete bro for the most part, with the 'flaw' that he was honest with himself, unlike the MC.",
            steam:"https://store.steampowered.com/app/3915320/I_Wish_I_Had_Never_Gone_into_the_Dungeon/",
            images:['dntr1', 'dntr2', 'dntr3', 'dntr4', 'dntr5'],
        },
        "Shachiku":{
            title:"Corporate Slave Succubus",
            description:"A game that I can only describe as non-stop H. I thoroughly enjoyed every bit of it, playing it and localizing it and all. The rapey bits were especially to my liking.",
            steam:"https://store.steampowered.com/app/3658820/Corporate_Slave_Succubus/",
            images:['css1', 'css2', 'css3', 'css4', 'css5'],
        },
        "WTR":{
            title:"World Tree Ranch: Elven Legacy",
            description:"An incredibly short farming-style game, where your goal is to repopulate a village of loli elves. Very simple, but I can't say that it was bad.",
            steam:"https://store.steampowered.com/app/3586450/World_Tree_Ranch_Elven_Legacy/?curator_clanid=38391122",
            images:['wtr1', 'wtr2', 'wtr3', 'wtr4', 'wtr5'],
        },
        "Mizuki":{
            title:"Mizuki: Demon Slaying Housewife",
            description:"A very short taima style RPGM game. I personally liked it a lot, but I really love the taima genre. YMMV.",
            steam:"https://store.steampowered.com/app/3941770/Mizuki_DemonSlaying_Housewife/",
            images:['taima1', 'taima2', 'taima3', 'taima4', 'taima5'],
        },
        "Koikatsu":{
            title:"Koikatsu!",
            description:"The first game I ever got paid to translate. Completely fan-funded, at the start all we set out to do was retranslate the game because the official release was complete ass. But it grew into so much more.",
            patch:"https://github.com/ManlyMarco/KK-HF_Patch",
            images:[],
        },
        "Koikatsu Sunshine":{
            title:"Koikatsu! Sunshine",
            description:"The second game in the Koikatsu series. All I can say is that it's more Koikatsu, with more stuff, although not that much more.",
            patch:"https://github.com/ManlyMarco/KKS-HF_Patch",
            images:[],
        },
        "Natsu no Sakari": {
            title:"Natsu no Sakari / Summer in Heat",
            description:"An H-game produced by a Japanese indie company called 'Miconisomi'. Incredibly high quality, we translated it because we loved it so much.",
            patch:"https://github.com/ManlyMarco/SiH-HF_Patch",
            images:[],
        },
        "Insult Order": {
            title:"Insult Order",
            description:"Another H-game produced by 'Miconisomi'. Older than Natsu no Sakari, it's still very high quality and has interesting content.",
            patch:"https://github.com/ManlyMarco/IO-HF_Patch",
            images:[],
        },
    }

    function showModal(gameElem) {
        // TODO: ADD LINK RENAMING "DLSITE" AND "GITHUB"
        const $el = $(`
    <div class="modal fade">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">${gameElem.title}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body d-flex flex-column text-center justify-content-center align-items-center">
                <div class="img-viewer col-9">
                    <div class="img-viewer-display py-2">
                        <img class="display-img" src="assets/screenshots/${gameElem.images[0]}.jpg" alt="">
                    </div>
                    <div class="img-ribbon">
                        <a href="#" class="ribbon-img-link"><img class="ribbon-img" src="assets/screenshots/${gameElem.images[0]}.jpg" alt=""></a>
                        <a href="#" class="ribbon-img-link"><img class="ribbon-img" src="assets/screenshots/${gameElem.images[1]}.jpg" alt=""></a>
                        <a href="#" class="ribbon-img-link"><img class="ribbon-img" src="assets/screenshots/${gameElem.images[2]}.jpg" alt=""></a>
                        <a href="#" class="ribbon-img-link"><img class="ribbon-img" src="assets/screenshots/${gameElem.images[3]}.jpg" alt=""></a>
                        <a href="#" class="ribbon-img-link"><img class="ribbon-img" src="assets/screenshots/${gameElem.images[4]}.jpg" alt=""></a>
                    </div>
                </div>
                <hr>
                <div class="gameDesc col-md-8 col-11">
                ${gameElem.description}
                </div>
                <div class="steam-link">
                <br>
                <span>Links: <a href="${gameElem.steam}">Steam</a></span>
                </div>
            </div>
        </div>
      </div>
    </div>
  `).appendTo('body');

        new bootstrap.Modal($el[0]).show();
    }

    $('.gameElem').on('click', function (){
        showModal(gameData[$(this).attr('id')])
        $('.ribbon-img-link').on("click", function (e){
            e.preventDefault();
            let imgLink = $(this).find('.ribbon-img').attr('src');
            $('.display-img').attr('src', imgLink);
        })
    })


</script>
</html>
